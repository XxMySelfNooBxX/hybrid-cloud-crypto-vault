runtime: python
env: flex

entrypoint: gunicorn -b :$PORT -w 1 --threads 8 app:app

runtime_config:
  operating_system: ubuntu22
  runtime_version: "3.12"

network:
  session_affinity: true

resources:
  cpu: 1
  memory_gb: 0.5
  disk_size_gb: 10

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 3
  cool_down_period_sec: 120
  cpu_utilization:
    target_utilization: 0.65