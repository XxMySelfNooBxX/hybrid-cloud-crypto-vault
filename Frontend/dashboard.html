<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Secure Vault | LEVEL 5</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --neon-cyan: #00f3ff; --neon-pink: #ff00ff; --matrix-green: #0f0; --dark-bg: #050505; --glass: rgba(10, 10, 16, 0.9); --body-bg: #000; --text-primary: #00f3ff; --text-secondary: #aaa; --text-muted: #888; --border-color: #333; --input-bg: #000; --input-border: #444; --input-text: #fff; --container-bg: rgba(10, 10, 16, 0.9); --output-bg: #0a0a0a; --tab-bg: rgba(0,0,0,0.5); --tab-hover-bg: #222; --modal-bg: #111; }
        body.light-theme { --neon-cyan: #0066cc; --neon-pink: #cc0066; --matrix-green: #008800; --dark-bg: #f5f5f5; --glass: rgba(255, 255, 255, 0.95); --body-bg: #e8e8e8; --text-primary: #0066cc; --text-secondary: #555; --text-muted: #777; --border-color: #ccc; --input-bg: #fff; --input-border: #bbb; --input-text: #222; --container-bg: rgba(255, 255, 255, 0.95); --output-bg: #f0f0f0; --tab-bg: rgba(240,240,240,0.8); --tab-hover-bg: #ddd; --modal-bg: #f5f5f5; }
        body { margin: 0; padding: 0; background-color: var(--body-bg); color: var(--text-primary); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        
        /* BACKGROUND 1: Dark Mode Matrix */
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; transition: opacity 0.3s; }
        
        /* BACKGROUND 2: Light Mode Blueprint Grid */
        body.light-theme #matrix-bg { display: none; } /* Kills the matrix in light mode */
        body.light-theme { 
            background-color: #f0f2f5;
            background-image: 
                linear-gradient(rgba(0, 102, 204, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 102, 204, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            background-attachment: fixed;
        }

        .container { max-width: 700px; margin: 50px auto; background: var(--container-bg); padding: 40px; border: 1px solid var(--border-color); box-shadow: 0 0 20px rgba(0, 0, 0, 0.8); border-radius: 4px; backdrop-filter: blur(10px); transition: background 0.3s, border-color 0.3s; }
        body.light-theme .container { box-shadow: 0 4px 30px rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.1); }
        h1 { margin: 0; letter-spacing: 3px; font-size: 32px; color: var(--text-primary); text-transform: uppercase; font-weight: normal; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .theme-toggle { background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 12px; font-size: 18px; width: auto; margin: 0; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .theme-toggle:hover { border-color: var(--text-primary); color: var(--text-primary); background: transparent; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; display: block; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; background: var(--tab-bg); border: none; color: #666; font-family: inherit; font-size: 16px; transition: 0.3s; }
        .tab:hover { color: var(--input-text); background: var(--tab-hover-bg); }
        .tab.active { background: rgba(0, 243, 255, 0.1); color: var(--text-primary); border-bottom: 2px solid var(--text-primary); font-weight: bold; }
        body.light-theme .tab.active { background: rgba(0, 102, 204, 0.08); }
        .mode-content { display: none; }
        .mode-content.active { display: block; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { font-size: 14px; color: var(--text-secondary); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; box-sizing: border-box; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--input-text); padding: 15px; font-family: inherit; font-size: 16px; outline: none; transition: background 0.3s, border-color 0.3s, color 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: var(--text-primary); }
        .strength-container { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .strength-bar { height: 4px; background: #222; width: 100%; position: relative; }
        .strength-bar::after { content:''; position: absolute; top:0; left:0; height:100%; width:0%; transition: 0.5s; }
        .weak::after { width: 30%; background: #ff3333; }
        .medium::after { width: 60%; background: #ffcc00; }
        .strong::after { width: 100%; background: #0f0; }
        .crack-time { font-size: 12px; font-weight: bold; margin-left: 10px; white-space: nowrap; }
        button { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--text-primary); color: var(--text-primary); cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        button:hover { background: var(--text-primary); color: var(--body-bg); }
        .output-box { margin-top: 30px; padding: 20px; border: 1px dashed var(--input-border); background: var(--output-bg); min-height: 60px; word-break: break-all; transition: background 0.3s, border-color 0.3s; }
        .security-controls { display: flex; gap: 20px; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        
        .panic-btn { border-color: #ff3333; color: #ff3333; }
        .panic-btn:hover { background: #ff3333; color: white; }
        
        /* FIXED VIEW LOGS BUTTON STYLING */
        .logs-btn { border-color: var(--input-text); color: var(--input-text); }
        .logs-btn:hover { background: var(--input-text); color: var(--body-bg); }
        
        #brute-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; color: #0f0; padding: 20px; font-family: 'Courier New', monospace; overflow: hidden; }
        #brute-console { width: 100%; height: 80%; overflow-y: hidden; font-size: 14px; opacity: 0.8; text-align: left; }
        .terminal-line { margin: 2px 0; }
        .crack-success-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: black; background: #0f0; padding: 20px; border: 5px solid #0f0; text-align: center; box-shadow: 0 0 50px #0f0; animation: blink 0.5s infinite; z-index: 10001; }
        .crack-fail-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); padding: 20px; background: #000; text-align: center; z-index: 10001; }
        #abort-btn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 300px; padding: 20px; font-size: 18px; letter-spacing: 2px; background: rgba(255, 0, 0, 0.2); border: 2px solid red; color: red; box-shadow: 0 0 20px red; animation: pulseRed 1s infinite; z-index: 10002; }
        #abort-btn:hover { background: red; color: white; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 10px red; } 50% { box-shadow: 0 0 30px red; } 100% { box-shadow: 0 0 10px red; } }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); }
        .modal-content { background-color: var(--modal-bg); margin: 5% auto; padding: 30px; border: 1px solid var(--input-border); width: 90%; max-width: 900px; border-radius: 4px; text-align: left; transition: background-color 0.3s; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #aaa; font-size: 24px; cursor: pointer; }
        .log-header { font-size: 12px; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 0.8fr 1fr 1fr 1fr 1.5fr 0.8fr; font-weight: bold; }
        .log-entry { font-size: 13px; color: var(--input-text); padding: 10px; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 0.8fr 1fr 1fr 1fr 1.5fr 0.8fr; }
        .status-success { color: var(--matrix-green); }
        .status-fail { color: #ff3333; font-weight: bold; }
        .status-alert { color: #ffcc00; font-weight: bold; }
        .status-panic { color: var(--neon-pink); font-weight: bold; }
        #qr-container { display: none; margin-top: 20px; text-align: center; }
        #qr-image { border: 2px solid white; padding: 5px; background: white; }
        .sm-btn { padding: 8px 15px; font-size: 12px; width: auto; display: inline-block; }
        .action-bar { margin-top: 15px; display: flex; gap: 10px; }

        /* --- DRAG & DROP ZONE --- */
        .drop-zone { border: 2px dashed var(--input-border); padding: 40px 20px; text-align: center; cursor: pointer; transition: 0.3s; background: var(--input-bg); position: relative; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--text-primary); background: rgba(0, 243, 255, 0.05); }
        body.light-theme .drop-zone:hover, body.light-theme .drop-zone.drag-over { background: rgba(0, 102, 204, 0.05); }
        .drop-zone-icon { font-size: 36px; margin-bottom: 10px; }
        .drop-zone-text { color: var(--text-muted); font-size: 14px; }
        .drop-zone-text strong { color: var(--text-primary); }
        .drop-zone-file { margin-top: 10px; color: var(--matrix-green); font-size: 13px; }
        .drop-zone input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        /* --- HISTORY MODAL --- */
        .history-entry { padding: 12px 15px; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 0.6fr 0.5fr 0.4fr; gap: 10px; align-items: center; font-size: 13px; color: var(--input-text); }
        .history-entry:hover { background: rgba(0, 243, 255, 0.05); }
        body.light-theme .history-entry:hover { background: rgba(0, 102, 204, 0.05); }
        .history-header { padding: 10px 15px; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 0.6fr 0.5fr 0.4fr; gap: 10px; font-size: 12px; color: var(--text-muted); font-weight: bold; }
        .history-result { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
        .history-mode { padding: 2px 8px; border-radius: 3px; font-size: 11px; text-transform: uppercase; display: inline-block; }
        .history-mode.encrypt { background: rgba(0, 243, 255, 0.15); color: var(--text-primary); }
        .history-mode.decrypt { background: rgba(0, 255, 0, 0.15); color: var(--matrix-green); }
        .history-actions { display: flex; gap: 5px; }
        .history-copy-btn { padding: 4px 10px; font-size: 11px; width: auto; margin: 0; }
        .history-empty { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div id="brute-overlay">
        <div id="brute-console"></div>
        <button id="abort-btn" onclick="closeBrute()">⛔ ABORT SEQUENCE</button>
    </div>
    <div class="container">
        <div class="header-row">
            <h1>HYBRID VAULT</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode" id="theme-btn">☀️</button>
        </div>
        <span class="subtitle">AES-256-GCM | FORENSIC AUDIT SYSTEM | LEVEL 5</span>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('text')">TEXT ENCRYPTION</button>
            <button class="tab" onclick="switchTab('file')">FILE ENCRYPTION</button>
        </div>
        <div id="text-mode" class="mode-content active">
            <div class="input-group">
                <label>SECURE DATA INPUT</label>
                <textarea id="message" rows="3" placeholder="Enter sensitive intelligence..."></textarea>
            </div>
            <div class="input-group">
                <label>ENCRYPTION KEY</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="text-key" placeholder="Enter password..." onkeyup="checkStrength(this.value, 'text-bar', 'text-time')">
                    <button class="sm-btn" onclick="startBruteForce()" style="width:auto; margin-top:0; border: 1px solid var(--neon-pink); color:var(--neon-pink);">⚡ SIMULATE HACK</button>
                </div>
                <div class="strength-container">
                    <div id="text-bar" class="strength-bar"></div>
                    <span id="text-time" class="crack-time"></span>
                </div>
            </div>
            <div style="display:flex; gap:15px;">
                <button onclick="processText('encrypt')">🔒 ENCRYPT</button>
                <button onclick="processText('decrypt')">🔓 DECRYPT</button>
            </div>
            <div class="output-box">
                <div id="text-output" style="text-align: left; color: var(--text-muted);">Waiting for encryption...</div>
                <div class="action-bar">
                    <button id="copy-btn" class="sm-btn" onclick="copyText()">📋 COPY OUTPUT</button>
                    <button class="sm-btn" onclick="generateQR()">📱 QR CODE</button>
                </div>
                <div id="qr-container"><img id="qr-image" src="" alt="QR Code"></div>
            </div>
        </div>
        <div id="file-mode" class="mode-content">
            <div class="input-group">
                <label>TARGET FILE UPLOAD</label>
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-icon">📂</div>
                    <div class="drop-zone-text">Drag & drop file here or <strong>click to browse</strong></div>
                    <div class="drop-zone-file" id="drop-zone-file"></div>
                    <input type="file" id="file-input" onchange="handleFileSelect(this)">
                </div>
            </div>
            <div class="input-group">
                <label>OUTPUT FORMAT (IMAGES ONLY)</label>
                <select id="file-format">
                    <option value="original">KEEP ORIGINAL FORMAT</option>
                    <option value="png">CONVERT TO PNG</option>
                    <option value="jpg">CONVERT TO JPG</option>
                    <option value="webp">CONVERT TO WEBP</option>
                </select>
            </div>
            <div class="input-group">
                <label>ENCRYPTION KEY</label>
                <input type="text" id="file-key" placeholder="Enter password..." onkeyup="checkStrength(this.value, 'file-bar', 'file-time')">
                <div class="strength-container">
                    <div id="file-bar" class="strength-bar"></div>
                    <span id="file-time" class="crack-time"></span>
                </div>
            </div>
            <div style="display:flex; gap:15px;">
                <button onclick="processFile('encrypt')">🔒 ENCRYPT FILE</button>
                <button onclick="processFile('decrypt')">🔓 DECRYPT FILE</button>
            </div>
            <div class="output-box" id="file-output" style="border:none; color: var(--text-muted);">Ready...</div>
        </div>
        <div class="security-controls">
            <button class="panic-btn" onclick="wipeScreen()">🛑 PANIC WIPE</button>
            <button class="logs-btn" onclick="openLogs()">👁️ VIEW LOGS</button>
            <button class="logs-btn" onclick="openHistory()" style="border-color: var(--neon-pink); color: var(--neon-pink);">🕒 HISTORY</button>
        </div>
    </div>
    
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; color:var(--input-text);">ENCRYPTION HISTORY</h2>
                <span class="close-btn" onclick="closeHistory()" style="cursor:pointer; font-size:24px; color:var(--input-text);">&times;</span>
            </div>
            <div class="history-header">
                <span>RESULT</span><span>TIMESTAMP</span><span>MODE</span><span>ACTIONS</span>
            </div>
            <div id="history-container" style="max-height:400px; overflow-y:auto; border-bottom:1px solid var(--border-color);"></div>
            <div style="display:flex; gap:15px; margin-top:20px;">
                <button class="sm-btn" style="border-color:#ff3333; color:#ff3333;" onclick="clearHistory()">🗑️ CLEAR ALL</button>
                <button class="sm-btn" style="border-color:var(--text-muted); color:var(--text-muted);" onclick="closeHistory()">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="logModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; color:var(--input-text);">SYSTEM LOGS</h2>
                <span class="close-btn" onclick="closeLogs()" style="cursor:pointer; font-size:24px; color:var(--input-text);">&times;</span>
            </div>
            <div class="log-header">
                <span>TIME</span><span>IP</span><span>LOC</span><span>DEVICE</span><span>ACTION</span><span>STATUS</span>
            </div>
            <div id="log-container" style="max-height:400px; overflow-y:auto; border-bottom:1px solid var(--border-color);">Loading...</div>
            <div style="display:flex; gap:15px; margin-top:20px;">
                <button class="sm-btn" style="border-color:var(--neon-cyan);" onclick="downloadReport()">📄 PDF REPORT</button>
                <button class="sm-btn" style="border-color:var(--text-muted); color:var(--text-muted);" onclick="closeLogs()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://cloud-project-486813.el.r.appspot.com/";

        // ========== MATRIX ENGINE & RESIZE HANDLER ==========
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const fontSize = 14; 
        let rainDrops = []; 
        for( let x = 0; x < canvas.width/fontSize; x++ ) { rainDrops[x] = 1; }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const newCols = Math.floor(canvas.width / fontSize);
            while(rainDrops.length < newCols) { rainDrops.push(Math.random() * 100); }
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        const draw = () => {
            // Stop drawing completely if light mode is active to save CPU
            if (document.body.classList.contains('light-theme')) return;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0'; 
            ctx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        let matrixInterval = setInterval(draw, 30);

        // ========== THEME TOGGLE ==========
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('vault-theme', isLight ? 'light' : 'dark');
            
            // Clean up the canvas background if switching back to dark mode
            if (!isLight) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        (function loadTheme() {
            if (localStorage.getItem('vault-theme') === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('theme-btn').textContent = '🌙';
            }
        })();

        // ========== ENCRYPTION HISTORY (localStorage) ==========
        function getHistory() {
            try { return JSON.parse(localStorage.getItem('vault-history') || '[]'); } catch { return []; }
        }
        function saveToHistory(result, mode) {
            const history = getHistory();
            history.unshift({ result, mode, time: new Date().toLocaleString() });
            if (history.length > 50) history.length = 50; 
            localStorage.setItem('vault-history', JSON.stringify(history));
        }
        function renderHistory() {
            const container = document.getElementById('history-container');
            const history = getHistory();
            if (history.length === 0) {
                container.innerHTML = '<div class="history-empty">No encryption history yet.</div>';
                return;
            }
            container.innerHTML = '';
            history.forEach((entry, i) => {
                const row = document.createElement('div');
                row.className = 'history-entry';
                row.innerHTML = `
                    <span class="history-result" title="${entry.result}">${entry.result}</span>
                    <span style="color:var(--text-muted)">${entry.time}</span>
                    <span><span class="history-mode ${entry.mode}">${entry.mode}</span></span>
                    <span class="history-actions">
                        <button class="sm-btn history-copy-btn" onclick="copyHistoryItem(${i})">📋</button>
                        <button class="sm-btn history-copy-btn" style="border-color:#ff3333;color:#ff3333;" onclick="deleteHistoryItem(${i})">✕</button>
                    </span>`;
                container.appendChild(row);
            });
        }
        function copyHistoryItem(index) {
            const history = getHistory();
            if (!history[index]) return;
            navigator.clipboard.writeText(history[index].result).catch(() => {
                const ta = document.createElement('textarea'); ta.value = history[index].result;
                ta.style.position = 'fixed'; ta.style.left = '-9999px';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            });
        }
        function deleteHistoryItem(index) {
            const history = getHistory();
            history.splice(index, 1);
            localStorage.setItem('vault-history', JSON.stringify(history));
            renderHistory();
        }
        function clearHistory() {
            if (!confirm('Clear all encryption history?')) return;
            localStorage.removeItem('vault-history');
            renderHistory();
        }
        function openHistory() { document.getElementById('historyModal').style.display = 'block'; renderHistory(); }
        function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

        // ========== DRAG & DROP ==========
        (function initDropZone() {
            const zone = document.getElementById('drop-zone');
            if (!zone) return;
            ['dragenter', 'dragover'].forEach(evt => zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.add('drag-over'); }));
            ['dragleave', 'drop'].forEach(evt => zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.remove('drag-over'); }));
            zone.addEventListener('drop', e => {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    document.getElementById('file-input').files = files;
                    showDroppedFile(files[0].name);
                }
            });
        })();
        function handleFileSelect(input) {
            if (input.files.length > 0) showDroppedFile(input.files[0].name);
        }
        function showDroppedFile(name) {
            document.getElementById('drop-zone-file').textContent = '✓ ' + name;
        }
        function copyText() {
            const text = document.getElementById('text-output').innerText;
            if (!text || text.includes("Waiting")) return alert("Nothing to copy!");
            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                if (successful) showCopySuccess(); else alert("❌ Copy failed.");
            } catch (err) { alert("❌ Error: " + err); }
        }
        function showCopySuccess() {
            const btn = document.getElementById("copy-btn");
            const originalText = "📋 COPY OUTPUT";
            btn.innerHTML = "✅ COPIED!"; btn.style.borderColor = "#0f0"; btn.style.color = "#0f0";
            setTimeout(() => { btn.innerHTML = originalText; btn.style.borderColor = "var(--neon-cyan)"; btn.style.color = "var(--neon-cyan)"; }, 2000);
        }
        let bruteInterval;
        function startBruteForce() {
            const password = document.getElementById('text-key').value;
            if (!password) return alert("Enter a password to test!");
            const overlay = document.getElementById('brute-overlay');
            const consoleDiv = document.getElementById('brute-console');
            consoleDiv.innerHTML = ""; overlay.style.display = 'block';
            let isWeak = password.length < 8; let counter = 0;
            bruteInterval = setInterval(() => {
                const hex = Math.random().toString(16).substr(2, 8).toUpperCase();
                const attempt = Math.random().toString(36).substr(2, 6);
                const line = document.createElement('div');
                line.className = 'terminal-line';
                line.innerHTML = `<span style="color:#555;">[0x${hex}]</span> TESTING KEY: ${attempt}... <span style="color:red;">ACCESS DENIED</span>`;
                consoleDiv.appendChild(line); consoleDiv.scrollTop = consoleDiv.scrollHeight;
                counter++;
                if (isWeak && counter > 50) {
                    clearInterval(bruteInterval);
                    const success = document.createElement('div');
                    success.className = 'crack-success-msg';
                    let time = (password.length * 0.05).toFixed(2);
                    success.innerHTML = `⚠️ PASSWORD CRACKED ⚠️<br>KEY: ${password}<br>TIME: ${time}s`;
                    consoleDiv.appendChild(success);
                }
                if (!isWeak && counter > 150) {
                    clearInterval(bruteInterval);
                    const fail = document.createElement('div');
                    fail.className = 'crack-fail-msg';
                    fail.innerHTML = `🛡️ BRUTE FORCE FAILED 🛡️<br>ENCRYPTION TOO STRONG<br>EST. TIME: 4 MILLION YEARS`;
                    consoleDiv.appendChild(fail);
                }
            }, 30);
        }
        function closeBrute() { clearInterval(bruteInterval); document.getElementById('brute-overlay').style.display = 'none'; }
        
        function checkStrength(password, barId, timeId) {
            const bar = document.getElementById(barId);
            const timeLabel = document.getElementById(timeId);
            let strength = 0;
            if (password.length > 5) strength++; if (password.length > 10) strength++;
            if (/[A-Z]/.test(password)) strength++; if (/[0-9]/.test(password)) strength++;
            if (password.length > 15) strength += 2; 
            let color = "#ff3333"; let timeString = "Instantly";
            if (strength >= 2) { color = "#ffcc00"; timeString = "2 Days"; }
            if (strength >= 4) { color = "#0f0"; timeString = "Centuries"; }
            if (password.length === 0) timeString = "";
            timeLabel.innerText = timeString ? "Crack Time: " + timeString : "";
            timeLabel.style.color = color;
            bar.className = 'strength-bar'; 
            if (strength < 2) bar.classList.add('weak'); else if (strength < 4) bar.classList.add('medium'); else bar.classList.add('strong');
        }
        
        async function downloadReport() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("FORENSIC INCIDENT REPORT", 14, 20);
            doc.setFontSize(10); doc.text("Generated: " + new Date().toLocaleString(), 14, 30);
            try {
                const res = await fetch(BACKEND_URL + "logs"); const data = await res.json();
                
                const tableData = data.logs.map(l => [
                    l.time, 
                    l.ip, 
                    l.location || "Unknown", 
                    (l.device || "Unknown").replace(/[^\x00-\x7F]/g, "").trim(), 
                    (l.action || "").replace(/[^\x00-\x7F]/g, "").trim(),        
                    l.status
                ]);
                
                doc.autoTable({ head: [['Time', 'IP', 'Location', 'Device', 'Action', 'Status']], body: tableData, startY: 40, theme: 'grid', styles: { fontSize: 7 } });
                doc.save("Forensic_Report.pdf");
            } catch (e) { alert("Error: " + e); }
        }

        async function fetchLogs() {
            try {
                const res = await fetch(BACKEND_URL + "logs"); const data = await res.json();
                const div = document.getElementById('log-container'); div.innerHTML = "";
                data.logs.forEach(l => {
                    const row = document.createElement("div"); row.className = "log-entry";
                    let statusClass = "status-success";
                    if (l.status.includes('FAIL') || l.status.includes('ERROR')) statusClass = "status-fail";
                    if (l.status.includes('ALERT')) statusClass = "status-alert"; 
                    if (l.status.includes('WIPE')) statusClass = "status-panic"; 
                    row.innerHTML = `<span style="color:#888">${l.time}</span><span>${l.ip}</span><span style="color:#aaa">${l.location||"Unknown"}</span><span style="color:#aaa">${l.device||"Unknown"}</span><span>${l.action}</span><span class="${statusClass}">${l.status}</span>`;
                    div.appendChild(row);
                });
            } catch(e) {}
        }
        function openLogs() { document.getElementById('logModal').style.display = "block"; fetchLogs(); }
        function closeLogs() { document.getElementById('logModal').style.display = "none"; }
        window.onclick = function(ev) {
            if (ev.target == document.getElementById('logModal')) closeLogs();
            if (ev.target == document.getElementById('historyModal')) closeHistory();
        }
        async function wipeScreen() {
            try { await fetch(BACKEND_URL + "panic", { method: "POST" }); } catch(e) {}
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            document.getElementById('text-output').innerText = "System Ready...";
            document.getElementById('qr-container').style.display = "none";
            document.getElementById('text-time').innerText = ""; document.getElementById('file-time').innerText = "";
            alert("⚠️ SECURE WIPE EXECUTED."); fetchLogs();
        }
        function switchTab(mode) {
            document.querySelectorAll('.mode-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(mode + '-mode').classList.add('active'); event.target.classList.add('active');
        }
        async function processText(mode) {
            const msg = document.getElementById('message').value; const key = document.getElementById('text-key').value;
            const out = document.getElementById('text-output'); document.getElementById('qr-container').style.display = "none";
            if(!msg || !key) return alert("System Error: Input Required");
            out.innerText = "Encrypting packet stream..."; out.style.color = "var(--neon-cyan)";
            try {
                const res = await fetch(BACKEND_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: msg, key: key, mode: mode }) });
                const data = await res.json();
                out.innerText = data.result || data.error;
                out.style.color = data.result && !data.result.includes("FAILED") && !data.result.includes("ERROR") ? "var(--neon-cyan)" : "#ff3333";
                if (data.result && !data.result.includes("FAILED") && !data.result.includes("ERROR")) {
                    saveToHistory(data.result, mode);
                }
                fetchLogs();
            } catch(e) { out.innerText = "Connection Error: " + e; }
        }
        async function processFile(mode) {
            const fileInput = document.getElementById('file-input'); const key = document.getElementById('file-key').value;
            const out = document.getElementById('file-output'); const format = document.getElementById('file-format').value;
            if(fileInput.files.length === 0 || !key) return alert("System Error: File Required");
            out.innerText = "Initiating File Transfer..."; out.style.color = "var(--text-muted)";
            const formData = new FormData(); formData.append('file', fileInput.files[0]); formData.append('key', key); formData.append('mode', mode); formData.append('format', format);
            try {
                const res = await fetch(BACKEND_URL + "file", { method: "POST", body: formData });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url;
                    let filename = mode === 'encrypt' ? "encrypted.enc" : "decrypted_file";
                    const disposition = res.headers.get('Content-Disposition');
                    if (disposition && disposition.indexOf('filename=') !== -1) filename = disposition.split('filename=')[1].replace(/"/g, '');
                    a.download = filename; document.body.appendChild(a); a.click(); a.remove();
                    out.innerText = "Operation Successful. Download starting..."; out.style.color = "#0f0";
                } else {
                    const err = await res.json(); out.innerText = "Error: " + (err.error || "Failed"); out.style.color = "#ff3333";
                }
                fetchLogs();
            } catch(e) { out.innerText = "Connection Error"; }
        }
        function generateQR() {
            const text = document.getElementById('text-output').innerText;
            if (text.includes("Ready") || text.includes("Error")) return alert("Data Stream Empty");
            document.getElementById('qr-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(text);
            document.getElementById('qr-container').style.display = "block";
        }
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
